name: PolicyGuard CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build, Docker check, and xUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore API
        run: dotnet restore backend/PolicyGuard.Api/PolicyGuard.Api.csproj

      - name: Restore test project
        run: dotnet restore backend/PolicyGuard.Api.Tests/PolicyGuard.Api.Tests.csproj

      - name: Build API
        run: dotnet build backend/PolicyGuard.Api/PolicyGuard.Api.csproj --configuration Release --no-restore

      - name: Run xUnit tests
        run: >-
          dotnet test backend/PolicyGuard.Api.Tests/PolicyGuard.Api.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=backend-tests.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/PolicyGuard.Api.Tests/TestResults/**/*.trx

      - name: Build API Docker image
        run: docker build -f backend/PolicyGuard.Api/Dockerfile -t policyguard-api:ci .

  frontend:
    name: Frontend install and production build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/policyguard-client/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/policyguard-client
        run: npm ci

      - name: Build frontend
        working-directory: frontend/policyguard-client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish API artifact
        run: >-
          dotnet publish backend/PolicyGuard.Api/PolicyGuard.Api.csproj
          --configuration Release
          --output ./publish

      - name: Skip API deployment when Azure settings are missing
        if: env.AZURE_WEBAPP_NAME == '' || env.AZURE_WEBAPP_PUBLISH_PROFILE == ''
        run: echo "Azure API deployment skipped. Set AZURE_WEBAPP_NAME repository variable and AZURE_WEBAPP_PUBLISH_PROFILE repository secret to enable deployment."

      - name: Deploy API
        if: env.AZURE_WEBAPP_NAME != '' && env.AZURE_WEBAPP_PUBLISH_PROFILE != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

  deploy-frontend:
    name: Deploy frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip frontend deployment when Azure token is missing
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
        run: echo "Azure Static Web Apps deployment skipped. Set AZURE_STATIC_WEB_APPS_API_TOKEN repository secret to enable deployment."

      - name: Deploy frontend
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/policyguard-client
          api_location: ""
          output_location: dist
